name: Production Readiness Gate

on:
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  production_readiness_gate:
    name: Production Readiness Gate
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-jammy
    timeout-minutes: 60
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vidyaos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vidyaos_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci


      - name: Run local production-readiness gate
        env:
          APP_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vidyaos_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-key-minimum-256-bits-long-enough
          REFRESH_SECRET_KEY: test-refresh-key-minimum-256-bits-long-enough
          NEXT_PUBLIC_API_URL: http://localhost:8000
          CI: "true"
        run: python scripts/production_readiness_gate.py --output production_readiness_report.md

      - name: Upload production-readiness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-readiness-report
          path: |
            production_readiness_report.md
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore
