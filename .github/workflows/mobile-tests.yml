name: Mobile Responsiveness Tests

env:
  PYTHON_VERSION: "3.11"

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - 'e2e/**'
      - 'playwright.config.ts'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - 'e2e/**'
      - 'playwright.config.ts'

jobs:
  mobile_e2e_tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-jammy
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci


      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Setup backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Start backend
        working-directory: backend
        run: |
          python main.py &
          sleep 10

      - name: Run mobile responsiveness tests
        working-directory: frontend
        run: npm run test:e2e:responsive
        env:
          BASE_URL: http://localhost:8000
          STUDENT_EMAIL: student@vidyaos.test
          STUDENT_PASSWORD: password123
          TEACHER_EMAIL: teacher@vidyaos.test
          TEACHER_PASSWORD: password123
          PARENT_EMAIL: parent@vidyaos.test
          PARENT_PASSWORD: password123
          ADMIN_EMAIL: admin@vidyaos.test
          ADMIN_PASSWORD: password123

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: frontend/test-results/
          retention-days: 30
