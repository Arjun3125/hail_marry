name: VidyaOS CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_full_e2e:
        description: "Run the full Playwright regression suite"
        required: false
        default: false
        type: boolean

concurrency:
  group: vidyaos-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend_ci:
    name: Backend CI
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vidyaos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vidyaos_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-asyncio

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .

      - name: Type-check (mypy)
        working-directory: backend
        run: mypy --ignore-missing-imports .

      - name: Architecture guard
        run: python scripts/check_architecture.py

      - name: Run backend tests
        working-directory: backend
        env:
          APP_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vidyaos_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-key-minimum-256-bits-long-enough
          REFRESH_SECRET_KEY: test-refresh-key-minimum-256-bits-long-enough
        run: pytest tests/ -v --junitxml=test-results/junit.xml

      - name: Upload Backend Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: backend/test-results
          if-no-files-found: ignore

  frontend_ci:
    name: Frontend CI & E2E
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-jammy
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/src/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend for E2E
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_DEMO_MODE: "true"
        run: npm run build

      - name: Install Python for Backend Server
        run: |
          apt-get update
          apt-get install -y python3 python3-pip python3-venv python-is-python3

      - name: Install backend dependencies for Playwright
        working-directory: backend
        run: |
          python -m venv .venv
          echo "$PWD/.venv/bin" >> $GITHUB_PATH
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full Playwright E2E suite
        working-directory: frontend
        env:
          CI: "true"
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_DEMO_MODE: "true"
          PLAYWRIGHT_WORKERS: "4"
          PLAYWRIGHT_RETRIES: "1"
        run: npm run test:e2e:full

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore

  backend_container_smoke:
    name: Backend Docker Build & Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          load: true
          tags: vidyaos-backend-smoke:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Start backend API container
        run: |
          docker run -d \
            --name vidyaos-backend-smoke \
            -p 8080:8080 \
            -e DEMO_MODE=true \
            -e APP_ENV=demo \
            -e DATABASE_URL=sqlite:///./ci_demo.db \
            -e REDIS_URL=redis://127.0.0.1:65535/0 \
            -e STARTUP_CHECKS_STRICT=false \
            -e STARTUP_CHECKS_TIMEOUT_SECONDS=2 \
            -e JWT_SECRET=ci-demo-secret-ci-demo-secret-ci-demo-secret \
            -e REFRESH_SECRET_KEY=ci-refresh-secret-ci-refresh-secret-ci-refresh-secret \
            -e APP_CORS_ORIGINS=http://127.0.0.1:3000 \
            vidyaos-backend-smoke:latest

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if [ "$(docker inspect -f '{{.State.Running}}' vidyaos-backend-smoke 2>/dev/null || echo false)" != "true" ]; then
              echo "Backend container exited before becoming healthy."
              docker logs vidyaos-backend-smoke || true
              exit 1
            fi
            if curl -fsS http://127.0.0.1:8080/health; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend container failed to become healthy."
          docker logs vidyaos-backend-smoke
          exit 1

      - name: Verify backend health payload
        run: curl -fsS http://127.0.0.1:8080/health

      - name: Print backend container logs
        if: always()
        run: docker logs vidyaos-backend-smoke || true

      - name: Stop backend container
        if: always()
        run: |
          docker stop vidyaos-backend-smoke || true
          docker rm vidyaos-backend-smoke || true

  docker_publish:
    name: Build & Publish Docker Images
    runs-on: ubuntu-latest
    needs: [backend_ci, backend_container_smoke, frontend_ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (backend)
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/vidyaos-backend
          tags: |
            type=sha
            type=raw,value=latest

      - name: Push backend image (uses cached layers from smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}
          cache-from: type=gha,scope=backend

      - name: Extract metadata (frontend)
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/vidyaos-frontend
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy_production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker_publish]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Check deploy secret availability
        id: deploy_secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
        run: |
          if [ -n "$DEPLOY_HOST" ] && [ -n "$DEPLOY_USER" ] && [ -n "$DEPLOY_SSH_KEY" ] && [ -n "$DEPLOY_APP_DIR" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Deployment secrets not fully configured; skipping production deploy."
          fi

      - name: Deploy over SSH
        if: steps.deploy_secrets.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            set -euo pipefail
            cd ${{ secrets.DEPLOY_APP_DIR }}
            docker compose pull
            docker compose up -d
            docker image prune -f
