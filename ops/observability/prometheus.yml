global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: vidyaos-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  - job_name: vidyaos-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8001"]

  - job_name: vidyaos-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:8010"]

  - job_name: vidyaos-gpu
    metrics_path: /metrics
    static_configs:
      - targets: ["dcgm-exporter:9400"]
