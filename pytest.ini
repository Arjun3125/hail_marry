[pytest]
markers =
    asyncio: marks tests that exercise async behavior
filterwarnings =
    ignore:.*Core Pydantic V1 functionality isn't compatible with Python 3.14.*:UserWarning
    ignore:builtin type SwigPyPacked has no __module__ attribute:DeprecationWarning
    ignore:builtin type SwigPyObject has no __module__ attribute:DeprecationWarning
    ignore:builtin type swigvarlink has no __module__ attribute:DeprecationWarning
    ignore:.*torch.ao.quantization is deprecated and will be removed in 2.10.*:DeprecationWarning
    ignore:.*'pin_memory' argument is set as true but no accelerator is found.*:UserWarning
    ignore:.*asyncio.iscoroutinefunction.*deprecated and slated for removal in Python 3.16.*:DeprecationWarning
