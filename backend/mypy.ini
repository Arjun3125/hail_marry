[mypy]
python_version = 3.11
mypy_path = .
explicit_package_bases = True
follow_imports = skip
ignore_missing_imports = True
warn_unused_configs = True
disable_error_code = annotation-unchecked
exclude = (?x)(
    ^(
        alembic
        | auth
        | data
        | demo_pdfs
        | locales
        | logs
        | middleware
        | models
        | routes
        | schemas
        | scripts
        | services
        | tests
        | uploads
        | utils
        | vector_store
    )([\\/].*)?$
    | ^src[\\/](domains|infrastructure|interfaces|shared)([\\/].*)?$
    | ^config\.py$
    | ^constants\.py$
    | ^worker_health_app\.py$
    | ^(
        check_ai_queries
        | check_faiss
        | create_demo_pdfs
        | deep_check_rag
        | demo_seed
        | find_hanging_test
        | generate_demo_ai_history
        | generate_real_ai_queries
        | ingest_demo_pdfs
        | ingest_pdfs_simple
        | ingest_standalone
        | scratchpad
        | seed
        | seed_cbse_demo
        | show_sample_responses
        | summarize_errors
        | test_rag_isolation
        | update_catalog
        | verify_counts
        | verify_demo
        | verify_seed
    )\.py$
    )
