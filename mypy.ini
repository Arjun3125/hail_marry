[mypy]
ignore_missing_imports = True
no_implicit_optional = False
warn_unused_ignores = False
check_untyped_defs = False
follow_imports = skip
ignore_errors = True

# Keep mypy available in CI without blocking on legacy typing debt.
exclude = ^backend/(alembic|tests|scripts)/|^backend/ingest_.*|^backend/generate_.*|^backend/summarize_errors\.py
